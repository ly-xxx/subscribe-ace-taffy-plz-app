name: Publish GitHub Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Verify TypeScript
        run: npm run typecheck

      - name: Prepare upload keystore
        env:
          NAIWA_UPLOAD_STORE_FILE: ${{ github.workspace }}/android-upload-keystore.jks
        run: |
          if [ -n "${{ secrets.NAIWA_UPLOAD_STORE_BASE64 }}" ]; then
            echo "${{ secrets.NAIWA_UPLOAD_STORE_BASE64 }}" | base64 --decode > "${NAIWA_UPLOAD_STORE_FILE}"
          fi

      - name: Build release APK and AAB
        working-directory: android
        env:
          NODE_ENV: production
          NAIWA_UPLOAD_STORE_FILE: ${{ github.workspace }}/android-upload-keystore.jks
          NAIWA_UPLOAD_STORE_PASSWORD: ${{ secrets.NAIWA_UPLOAD_STORE_PASSWORD }}
          NAIWA_UPLOAD_KEY_ALIAS: ${{ secrets.NAIWA_UPLOAD_KEY_ALIAS }}
          NAIWA_UPLOAD_KEY_PASSWORD: ${{ secrets.NAIWA_UPLOAD_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease -PreactNativeArchitectures=arm64-v8a
          ./gradlew bundleRelease -PreactNativeArchitectures=arm64-v8a,armeabi-v7a

      - name: Prepare release assets
        id: assets
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME:-manual}"
          APK_NAME="tangshi-jiadao-${TAG_NAME}-arm64-v8a.apk"
          AAB_NAME="tangshi-jiadao-${TAG_NAME}.aab"

          cp android/app/build/outputs/apk/release/app-release.apk "${APK_NAME}"
          cp android/app/build/outputs/bundle/release/app-release.aab "${AAB_NAME}"

          echo "apk_name=${APK_NAME}" >> "${GITHUB_OUTPUT}"
          echo "aab_name=${AAB_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.assets.outputs.apk_name }}
            ${{ steps.assets.outputs.aab_name }}
          generate_release_notes: true
          make_latest: true
          prerelease: ${{ contains(github.ref_name, '-') }}
