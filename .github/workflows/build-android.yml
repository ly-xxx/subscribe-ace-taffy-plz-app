name: Build Android Release

on:
  push:
    branches:
      - main
      - master
    paths:
      - .github/workflows/build-android.yml
      - android/**
      - assets/**
      - src/**
      - App.tsx
      - app.json
      - package.json
      - package-lock.json
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-release-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Verify TypeScript
        run: npm run typecheck

      - name: Prepare upload keystore
        env:
          NAIWA_UPLOAD_STORE_FILE: ${{ github.workspace }}/android-upload-keystore.jks
        run: |
          if [ -n "${{ secrets.NAIWA_UPLOAD_STORE_BASE64 }}" ]; then
            echo "${{ secrets.NAIWA_UPLOAD_STORE_BASE64 }}" | base64 --decode > "${NAIWA_UPLOAD_STORE_FILE}"
          fi

      - name: Build release APK and AAB
        working-directory: android
        env:
          NODE_ENV: production
          NAIWA_UPLOAD_STORE_FILE: ${{ github.workspace }}/android-upload-keystore.jks
          NAIWA_UPLOAD_STORE_PASSWORD: ${{ secrets.NAIWA_UPLOAD_STORE_PASSWORD }}
          NAIWA_UPLOAD_KEY_ALIAS: ${{ secrets.NAIWA_UPLOAD_KEY_ALIAS }}
          NAIWA_UPLOAD_KEY_PASSWORD: ${{ secrets.NAIWA_UPLOAD_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease -PreactNativeArchitectures=arm64-v8a
          ./gradlew bundleRelease -PreactNativeArchitectures=arm64-v8a,armeabi-v7a

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: tangshi-jiadao-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: tangshi-jiadao-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
